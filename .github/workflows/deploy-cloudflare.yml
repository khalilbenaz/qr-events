name: Deploy app to Cloudflare Pages

# Déploie l'application complète (web/) sur Cloudflare Pages.
# Opt-in : nécessite le secret CLOUDFLARE_API_TOKEN + la variable CF_DEPLOY=true.
#   gh secret set CLOUDFLARE_API_TOKEN --repo khalilbenaz/qr-events
#   gh variable set CF_DEPLOY --repo khalilbenaz/qr-events --body true
# Sinon, déploiement manuel : `cd web && npm run deploy`.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-cloudflare.yml"
  workflow_dispatch:

jobs:
  deploy:
    if: vars.CF_DEPLOY == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: rm -f package-lock.json && npm install
        working-directory: .
      - name: Build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://qr-events-api.khalilbenaz.workers.dev' }}
        run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name qr-events --branch main
          workingDirectory: web
