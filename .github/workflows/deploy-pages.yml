name: Deploy vitrine to GitHub Pages

# GitHub Pages héberge UNIQUEMENT la vitrine (site statique de présentation).
# L'application complète (dashboard + pages publiques + scan) est sur Cloudflare Pages :
# https://qr-events.pages.dev
on:
  push:
    branches: [main]
    paths:
      - "vitrine/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Fallback 404
        run: cp vitrine/index.html vitrine/404.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: vitrine
      - id: deployment
        uses: actions/deploy-pages@v4
