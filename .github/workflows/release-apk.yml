name: Release APK Android

# Déclenché par un tag de version (ex: v0.1.0) ou manuellement.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      api_url:
        description: "URL de l'API à embarquer dans l'APK"
        required: false
        default: "https://qr-events-api.khalilbenaz.workers.dev"

permissions:
  contents: write # créer la Release + y attacher l'APK

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build release APK
        env:
          API_URL: ${{ github.event.inputs.api_url || vars.MOBILE_API_URL || 'https://qr-events-api.khalilbenaz.workers.dev' }}
        run: flutter build apk --release --dart-define=API_URL=$API_URL

      - name: Renommer l'APK
        run: cp build/app/outputs/flutter-apk/app-release.apk qr-events-scanner.apk

      - name: Publier la Release avec l'APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/qr-events-scanner.apk
          generate_release_notes: true
          body: |
            ## QR Events — App mobile de scan (Android)

            APK installable directement (hors store). Active « Sources inconnues » sur Android.

            - API embarquée : `https://qr-events-api.khalilbenaz.workers.dev`
            - Connexion par **code d'accès porte** (créé dans le dashboard → onglet Scanners)

      - name: Artefact (déclenchement manuel)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: qr-events-scanner-apk
          path: mobile/qr-events-scanner.apk
