name = "qr-events-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# ---------------------------------------------------------------------------
# D1 (base de données SQLite)
# Crée la base puis colle l'id renvoyé ci-dessous :
#   npx wrangler d1 create qr-events
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "qr-events"
database_id = "c49e10ec-e6a0-496b-8cff-2df18e440b2a"
migrations_dir = "migrations"

# ---------------------------------------------------------------------------
# KV (cache / idempotence / rate-limit)
#   npx wrangler kv namespace create CACHE
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "CACHE"
id = "1de26c7d1e844354b72a2a921fa13f9d"

# ---------------------------------------------------------------------------
# Variables NON secrètes
# ---------------------------------------------------------------------------
[vars]
# Origine(s) autorisée(s) pour le CORS (dashboard + pages publiques).
# Inclut GitHub Pages (site web) + le dev local. Plusieurs valeurs séparées par des virgules.
ALLOWED_ORIGINS = "https://khalilbenaz.github.io,http://localhost:5173,http://localhost:4173"
# Base URL publique de l'API (utilisée pour construire les liens QR).
PUBLIC_API_URL = "https://qr-events-api.khalilbenaz.workers.dev"

# ---------------------------------------------------------------------------
# Secrets (NE PAS mettre ici). En local -> .dev.vars. En prod :
#   npx wrangler secret put JWT_SECRET
#   npx wrangler secret put QR_HMAC_SECRET
# ---------------------------------------------------------------------------
